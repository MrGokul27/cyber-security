<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Registration | Stackly</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../assets/images/logoStackly.webp"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/auth.css" />
  </head>

  <body>
    <main class="login-page">
      <div class="grid-background"></div>

      <div class="bg-orb orb-left"></div>
      <div class="bg-orb orb-right"></div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-11 col-md-10 col-lg-8 col-xl-6">
            <div class="glass-panel register-panel">
              <div class="scanline"></div>
              <div class="terminal-controls">
                <div class="t-dot bg-danger opacity-50"></div>
                <div class="t-dot bg-warning opacity-50"></div>
                <div class="t-dot bg-success opacity-50"></div>
              </div>

              <div class="mb-4">
                <a href="../../index.html" class="back-link">
                  <span class="material-symbols-outlined"> arrow_back </span>
                  Back to Home
                </a>
              </div>

              <div class="mb-4">
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="status-dot"></span>
                  <span class="secure-channel"> INIT_PROTOCOL_71A </span>
                </div>
                <h1 class="portal-title">Portal Registration</h1>

                <p class="portal-subtitle">
                  Initialize your administrative credentials for the Stackly
                  ecosystem.
                </p>
              </div>

              <form id="registrationForm">
                <div class="row">
                  <div class="col-md-6 mb-4">
                    <label class="custom-label"> Username </label>

                    <input
                      type="text"
                      id="username"
                      class="form-control custom-input"
                      placeholder="User Name"
                      maxlength="16"
                      required
                    />
                  </div>

                  <div class="col-md-6 mb-4">
                    <label class="custom-label"> Security Role </label>

                    <div class="position-relative">
                      <select class="form-select custom-input" required>
                        <option value="" selected disabled>
                          Select Security Level
                        </option>
                        <option value="analyst">Security Analyst</option>
                        <option value="administrator">
                          System Administrator
                        </option>
                        <option value="operator">Security Operator</option>
                      </select>

                      <span class="material-symbols-outlined select-icon">
                        expand_more
                      </span>
                    </div>
                  </div>
                </div>

                <div class="mb-4">
                  <label class="custom-label"> Email Address </label>

                  <input
                    type="email"
                    class="form-control custom-input"
                    placeholder="Enter Email"
                    required
                  />
                </div>

                <div class="row">
                  <div class="col-md-6 mb-4">
                    <label class="custom-label"> Password </label>

                    <div class="position-relative">
                      <input
                        type="password"
                        id="password"
                        class="form-control custom-input pe-5"
                        placeholder="••••••••"
                        required
                      />

                      <button
                        type="button"
                        class="password-toggle"
                        onclick="togglePassword('password')"
                      >
                        <span
                          class="material-symbols-outlined"
                          id="password-toggle-icon"
                        >
                          visibility
                        </span>
                      </button>
                    </div>

                    <div id="password-feedback" class="password-feedback"></div>
                  </div>

                  <div class="col-md-6 mb-4">
                    <label class="custom-label"> Confirm Password </label>

                    <input
                      type="password"
                      id="confirm-password"
                      class="form-control custom-input"
                      placeholder="••••••••"
                      required
                    />
                  </div>
                </div>

                <div class="form-check mb-4">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="terms"
                    required
                  />

                  <label
                    class="form-check-label text-secondary-custom"
                    for="terms"
                  >
                    I agree to the
                    <a href="#" class="forgot-link"> Secure Usage Protocols </a>
                    and
                    <a href="#" class="forgot-link"> Confidentiality Terms </a>
                  </label>
                </div>

                <button
                  type="submit"
                  class="btn login-btn w-100"
                  id="registerBtn"
                >
                  <span class="material-symbols-outlined"> lock </span>

                  Create Secure Account
                </button>

                <div class="footer-section mt-4">
                  Already have an account?
                  <a href="login.html" class="request-link">Login here </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../../assets/js/script.js"></script>
  </body>
</html>
