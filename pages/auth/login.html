<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly | Portal Access</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../assets/images/logoStackly.webp"
    />
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/auth.css" />
  </head>
  <body>
    <main class="login-page">
      <!-- Background Effects -->
      <div class="grid-background"></div>

      <div class="bg-orb orb-left"></div>
      <div class="bg-orb orb-right"></div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-sm-11 col-md-9 col-lg-7 col-xl-5">
            <div class="glass-panel">
              <div class="scanline"></div>
              <div class="terminal-controls">
                <div class="t-dot bg-danger opacity-50"></div>
                <div class="t-dot bg-warning opacity-50"></div>
                <div class="t-dot bg-success opacity-50"></div>
              </div>

              <!-- Back Link -->
              <div class="mb-4">
                <a href="../../index.html" class="back-link">
                  <span class="material-symbols-outlined"> arrow_back </span>
                  Back to Home
                </a>
              </div>

              <!-- Header -->
              <div class="mb-5">
                <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="status-dot"></span>
                  <span class="secure-channel text-uppercase"
                    >Node: Auth_Proxy_v4</span
                  >
                </div>
                <h1 class="portal-title">Portal Access</h1>
                <p class="portal-subtitle small">
                  Verify your credentials to enter the secure environment.
                </p>
              </div>

              <!-- Login Form -->
              <form id="loginForm">
                <!-- Role -->
                <div class="mb-4">
                  <label for="accessRole" class="form-label custom-label">
                    Access Role
                  </label>

                  <div class="position-relative">
                    <select
                      id="accessRole"
                      name="accessRole"
                      class="form-select custom-input"
                      required
                      autocomplete="off"
                    >
                      <option selected disabled>Select Security Level</option>

                      <option value="analyst">Security Analyst</option>
                      <option value="administrator">
                        System Administrator
                      </option>
                      <option value="operator">Security Operator</option>
                    </select>

                    <span class="material-symbols-outlined select-icon">
                      expand_more
                    </span>
                  </div>
                </div>

                <!-- Email -->
                <div class="mb-4">
                  <label for="operatorId" class="form-label custom-label">
                    Operator Identifier
                  </label>

                  <input
                    type="email"
                    id="operatorId"
                    name="operatorId"
                    class="form-control custom-input"
                    placeholder="name@company.com"
                    required
                    autocomplete="username"
                  />
                </div>

                <!-- Password -->
                <div class="mb-4">
                  <div
                    class="d-flex justify-content-between align-items-center mb-2"
                  >
                    <label for="password" class="form-label custom-label mb-0">
                      Encrypted Key
                    </label>
                  </div>

                  <div class="position-relative">
                    <input
                      type="password"
                      id="password"
                      name="password"
                      placeholder="••••••••"
                      class="form-control custom-input pe-5"
                      required
                      autocomplete="current-password"
                    />

                    <button
                      type="button"
                      class="password-toggle"
                      onclick="togglePassword()"
                    >
                      <span class="material-symbols-outlined" id="eye-icon">
                        visibility
                      </span>
                    </button>
                  </div>
                </div>

                <!-- Remember + Forgot -->
                <div
                  class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3"
                >
                  <div class="form-check custom-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="rememberMe"
                      required
                    />

                    <label class="form-check-label" for="rememberMe">
                      Remember Station
                    </label>
                  </div>

                  <a href="#" class="forgot-link"> Forgot Password? </a>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn login-btn w-100" id="loginBtn">
                  <span class="material-symbols-outlined"> lock </span>

                  Secure Login
                </button>
              </form>

              <!-- Footer -->
              <div class="footer-section">
                <p class="mb-0">
                  New system operator?

                  <a href="register.html" class="request-link">
                    Request Access
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="../../assets/js/script.js"></script>
  </body>
</html>
