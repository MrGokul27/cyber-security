<!doctype html>

<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Stackly | Global Logs</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../../assets/images/logoStackly.webp"
    />
    <!-- Bootstrap 5.3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../../assets/css/dashboard.css" />
    <style>
      .scanline {
        width: 100%;
        height: 2px;
        background: rgba(0, 219, 233, 0.1);
        position: absolute;
        animation: scan 4s linear infinite;
      }
      @keyframes scan {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }
      .log-line:hover {
        background: rgba(0, 219, 233, 0.05);
      }
      .terminal-scroll::-webkit-scrollbar {
        width: 4px;
      }
      .terminal-scroll::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      .terminal-scroll::-webkit-scrollbar-thumb {
        background: #00dbe9;
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background bg-cyber-radial overflow-hidden"
  >
    <div id="magic-cursor"></div>

    <!-- Dashboard Layout -->
    <div class="d-flex">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel" id="sidebar">
        <div
          class="p-3 border-bottom border-outline-variant d-flex align-items-center gap-2"
        >
          <a href="../../../index.html">
            <img
              src="../../../assets/images/logoStackly.webp"
              alt="Logo"
              width="100"
            />
          </a>
        </div>

        <div class="p-3" id="sidebar-nav">
          <div class="label-caps mb-3 opacity-50 px-3" style="font-size: 10px">
            Security Terminal
          </div>
          <!-- Nav items injected by dashboard.js -->
        </div>

        <div class="mt-auto p-3 border-top border-outline-variant">
          <a href="../../auth/login.html" class="nav-link-custom text-danger">
            <span class="material-symbols-outlined">logout</span>
            TERMINATE_SESSION
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content w-100 vh-100 overflow-y-auto bg-background">
        <!-- Header -->
        <header
          class="dashboard-header d-flex align-items-center justify-content-between px-4 sticky-top"
        >
          <div class="d-flex align-items-center gap-3">
            <button
              class="btn btn-link text-on-surface d-lg-none p-0"
              id="sidebarToggle"
            >
              <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="h5 mb-0 font-monospace" id="role-display">
              LOADING_ROLE...
            </div>
          </div>

          <div class="d-flex align-items-center gap-4">
            <div class="text-end d-none d-md-block">
              <div
                class="small fw-bold text-primary-container"
                id="op-id-display"
              >
                ID: ---
              </div>
              <div
                class="small opacity-50 font-monospace"
                style="font-size: 10px"
              >
                UPLINK_STATUS: NOMINAL
              </div>
            </div>
            <div class="status-dot"></div>
          </div>
        </header>

        <!-- Dashboard Content -->
        <div class="p-4 d-flex flex-column" style="height: calc(100% - 70px)">
          <!-- Filters & Controls -->
          <div
            class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4 flex-shrink-0"
          >
            <div class="d-flex flex-wrap align-items-center gap-3">
              <h2 class="h4 fw-bold mb-0">
                System Global Logs
              </h2>
              <div
                class="vr bg-outline-variant opacity-25 d-none d-lg-block"
              ></div>
              <div class="d-flex align-items-center gap-2">
                <label
                  for="node-select"
                  class="small text-on-surface-variant text-uppercase"
                  >Node ID:</label
                >
                <select
                  id="node-select"
                  class="form-select form-select-sm bg-surface-container-high border-0 text-primary-container font-monospace"
                >
                  <option>ALL_NODES</option>
                  <option>SG_CORE_01</option>
                  <option>SG_NODE_PX5</option>
                  <option>SG_EDGE_09</option>
                </select>
              </div>
              <div class="d-flex align-items-center gap-2">
                <label
                  for="severity-select"
                  class="small text-on-surface-variant text-uppercase"
                  >Severity:</label
                >
                <div
                  class="btn-group btn-group-sm bg-surface-container-high p-1 rounded"
                >
                  <button class="btn btn-primary-custom">All</button>
                  <button class="btn btn-outline-custom">Warn</button>
                  <button class="btn btn-outline-custom">Crit</button>
                </div>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button
                class="btn btn-outline-custom d-flex align-items-center gap-2"
              >
                <span class="material-symbols-outlined small"
                  >file_download</span
                >
                Export PDF
              </button>
              <button
                class="btn btn-outline-custom d-flex align-items-center gap-2"
              >
                <span class="material-symbols-outlined small">table_chart</span>
                Export CSV
              </button>
            </div>
          </div>

          <!-- Main Layout Grid -->
          <div class="row g-4 flex-grow-1" style="min-height: 0">
            <!-- Terminal Log Stream -->
            <div class="col-12 col-lg-9 d-flex flex-column">
              <div
                class="glass-panel rounded-top overflow-hidden d-flex flex-column flex-grow-1 position-relative"
              >
                <div class="scanline"></div>
                <div
                  class="px-3 py-2 bg-surface-container-high border-bottom border-outline-variant d-flex justify-content-between align-items-center flex-shrink-0"
                >
                  <div class="d-flex align-items-center gap-2">
                    <div class="d-flex gap-1">
                      <div
                        class="rounded-circle bg-danger bg-opacity-50 border border-danger"
                        style="width: 12px; height: 12px"
                      ></div>
                      <div
                        class="rounded-circle bg-primary-container bg-opacity-50 border border-primary-container"
                        style="width: 12px; height: 12px"
                      ></div>
                      <div
                        class="rounded-circle bg-on-surface-variant bg-opacity-25 border border-on-surface-variant"
                        style="width: 12px; height: 12px"
                      ></div>
                    </div>
                    <span
                      class="ms-2 small font-monospace text-on-surface-variant"
                      >live_system_stream.sh</span
                    >
                  </div>
                  <div class="d-flex align-items-center gap-3">
                    <span
                      class="small font-monospace text-on-surface-variant animate-pulse"
                      >● STREAMING</span
                    >
                    <span
                      class="material-symbols-outlined text-on-surface-variant small cursor-pointer"
                      >fullscreen</span
                    >
                  </div>
                </div>
                <div
                  class="flex-grow-1 overflow-y-auto p-3 terminal-scroll font-monospace small"
                  id="log-terminal"
                  style="background-color: rgba(0, 0, 0, 0.4)"
                >
                  <!-- Logs will be injected here by JS -->
                </div>
              </div>
            </div>

            <!-- Metrics & Visualization Sidebar -->
            <div class="col-12 col-lg-3 d-flex flex-column gap-4">
              <!-- Ingestion Rate -->
              <div class="glass-panel p-4 rounded">
                <div
                  class="d-flex justify-content-between align-items-start mb-4"
                >
                  <div>
                    <h3 class="small text-on-surface-variant text-uppercase">
                      Log Ingestion
                    </h3>
                    <p class="h4 text-primary-container fw-bold mb-0">
                      2.4 <span class="h6 text-on-surface-variant">GB/s</span>
                    </p>
                  </div>
                  <span class="material-symbols-outlined text-primary-container"
                    >bar_chart</span
                  >
                </div>
                <div
                  class="d-flex align-items-end justify-content-between gap-2"
                  style="height: 80px"
                >
                  <div
                    class="w-100 bg-primary-container bg-opacity-25 rounded-top"
                    style="height: 40%"
                  ></div>
                  <div
                    class="w-100 bg-primary-container bg-opacity-25 rounded-top"
                    style="height: 60%"
                  ></div>
                  <div
                    class="w-100 bg-primary-container bg-opacity-25 rounded-top"
                    style="height: 85%"
                  ></div>
                  <div
                    class="w-100 bg-primary-container bg-opacity-25 rounded-top"
                    style="height: 50%"
                  ></div>
                  <div
                    class="w-100 bg-primary-container bg-opacity-25 rounded-top"
                    style="height: 100%"
                  ></div>
                  <div
                    class="w-100 bg-primary-container bg-opacity-25 rounded-top"
                    style="height: 70%"
                  ></div>
                </div>
              </div>
              <!-- Severity Distribution -->
              <div
                class="glass-panel p-4 rounded flex-grow-1 d-flex flex-column"
              >
                <h3 class="small text-on-surface-variant text-uppercase mb-4">
                  Severity Distribution
                </h3>
                <div class="d-flex flex-column gap-3">
                  <div>
                    <div
                      class="d-flex justify-content-between small font-monospace mb-1"
                    >
                      <span class="text-primary-container">INFO</span>
                      <span class="text-on-surface-variant">78%</span>
                    </div>
                    <div
                      class="progress bg-surface-container-highest"
                      style="height: 6px"
                    >
                      <div
                        class="progress-bar bg-primary-container"
                        style="width: 78%"
                      ></div>
                    </div>
                  </div>
                  <div>
                    <div
                      class="d-flex justify-content-between small font-monospace mb-1"
                    >
                      <span class="text-secondary">SYSTEM</span>
                      <span class="text-on-surface-variant">15%</span>
                    </div>
                    <div
                      class="progress bg-surface-container-highest"
                      style="height: 6px"
                    >
                      <div
                        class="progress-bar bg-secondary"
                        style="width: 15%"
                      ></div>
                    </div>
                  </div>
                  <div>
                    <div
                      class="d-flex justify-content-between small font-monospace mb-1"
                    >
                      <span class="text-warning">WARN</span>
                      <span class="text-on-surface-variant">5%</span>
                    </div>
                    <div
                      class="progress bg-surface-container-highest"
                      style="height: 6px"
                    >
                      <div
                        class="progress-bar bg-warning"
                        style="width: 5%"
                      ></div>
                    </div>
                  </div>
                  <div>
                    <div
                      class="d-flex justify-content-between small font-monospace mb-1"
                    >
                      <span class="text-danger">CRITICAL</span>
                      <span class="text-on-surface-variant">2%</span>
                    </div>
                    <div
                      class="progress bg-surface-container-highest"
                      style="height: 6px"
                    >
                      <div
                        class="progress-bar bg-danger"
                        style="width: 2%"
                      ></div>
                    </div>
                  </div>
                </div>
                <div class="mt-auto pt-4">
                  <button
                    class="btn btn-outline-custom w-100 d-flex align-items-center justify-content-center gap-2"
                  >
                    <span class="material-symbols-outlined small">refresh</span>
                    Clear Session Logs
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../../../assets/js/script.js"></script>
    <script src="../../../assets/js/dashboard.js"></script>
    <script>
      // Micro-interactions for terminal emulation
      const terminal = document.getElementById("log-terminal");
      const severities = ["INFO", "WARN", "SYSTEM", "CRITICAL"];
      const messages = [
        "Packet verification successful on port 443.",
        "Heuristic anomaly detected in encrypted stream.",
        "Load balancer refreshing routing table.",
        "Mirror sync: SG_BACKUP_A consistent with primary.",
        "SSH connection closed from internal node 10.0.0.45.",
        "Firewall rule #445 modified by Admin_01.",
        "Memory threshold exceeded on worker group B.",
        "Scanning for shadow assets in subnet /24.",
      ];

      function addLog() {
        const timestamp = new Date()
          .toISOString()
          .replace("T", " ")
          .substring(0, 19);
        const sev = severities[Math.floor(Math.random() * severities.length)];
        const msg = messages[Math.floor(Math.random() * messages.length)];

        let sevClass = "text-primary-container";
        if (sev === "WARN") sevClass = "text-warning";
        if (sev === "SYSTEM") sevClass = "text-secondary";
        if (sev === "CRITICAL") sevClass = "text-danger";

        const logLine = document.createElement("div");
        logLine.className = "row gx-3 log-line";
        logLine.innerHTML = `
              <div class="col-auto text-on-surface-variant opacity-50">[${timestamp}]</div>
              <div class="col-auto fw-bold ${sevClass}">${sev}</div>
              <div class="col text-on-surface">${msg}</div>
          `;

        terminal.appendChild(logLine);
        terminal.scrollTop = terminal.scrollHeight;

        if (terminal.children.length > 100) {
          terminal.removeChild(terminal.children[0]);
        }
      }

      // Add a log every 2-5 seconds
      setInterval(addLog, 1500 + Math.random() * 2000);
    </script>
  </body>
</html>
