<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Stackly | Dashboard</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="../../assets/images/logoStackly.webp"
    />
    <!-- Bootstrap 5.3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <link rel="stylesheet" href="../../assets/css/dashboard.css" />
  </head>
  <body
    class="bg-background text-on-background bg-cyber-radial overflow-hidden"
  >
    <div id="magic-cursor"></div>

    <!-- Dashboard Layout -->
    <div class="d-flex">
      <!-- Sidebar -->
      <aside class="sidebar glass-panel" id="sidebar">
        <div
          class="p-3 border-bottom border-outline-variant d-flex align-items-center gap-2"
        >
          <a href="../../index.html">
            <img
              src="../../assets/images/logoStackly.webp"
              alt="Logo"
              width="100"
            />
          </a>
        </div>

        <div class="p-3" id="sidebar-nav">
          <div class="label-caps mb-3 opacity-50 px-3" style="font-size: 10px">
            Security Terminal
          </div>
          <!-- Nav items injected by dashboard.js -->
        </div>

        <div class="mt-auto p-3 border-top border-outline-variant">
          <a href="../auth/login.html" class="nav-link-custom text-danger">
            <span class="material-symbols-outlined">logout</span>
            TERMINATE_SESSION
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content w-100 vh-100 overflow-y-auto bg-background">
        <!-- Header -->
        <header
          class="dashboard-header d-flex align-items-center justify-content-between px-4 sticky-top"
        >
          <div class="d-flex align-items-center gap-3">
            <button
              class="btn btn-link text-on-surface d-lg-none p-0"
              id="sidebarToggle"
            >
              <span class="material-symbols-outlined">menu</span>
            </button>
            <div class="h5 mb-0 font-monospace" id="role-display">
              LOADING_ROLE...
            </div>
          </div>

          <div class="d-flex align-items-center gap-4">
            <div class="text-end d-none d-md-block">
              <div
                class="small fw-bold text-primary-container"
                id="op-id-display"
              >
                ID: ---
              </div>
              <div
                class="small opacity-50 font-monospace"
                style="font-size: 10px"
              >
                UPLINK_STATUS: NOMINAL
              </div>
            </div>
            <div class="status-dot"></div>
          </div>
        </header>

        <!-- Dashboard Content -->
        <div class="p-4">
          <!-- Stats Row -->
          <div class="row g-4 mb-4" id="stats-container">
            <!-- Stats injected by dashboard.js -->
          </div>

          <div class="row g-4">
            <!-- Main Visualizations -->
            <div class="col-lg-8">
              <div
                class="glass-panel p-4 h-100 cyan-glow position-relative overflow-hidden"
              >
                <div class="scanline"></div>
                <div
                  class="d-flex justify-content-between align-items-center mb-4"
                >
                  <!-- Title for Live Network Latency -->
                  <h6 class="label-caps mb-0" id="latency-title">
                    Live Network Latency
                  </h6>
                  <span class="badge bg-secondary" id="latency-badge"
                    >MS_UPLINK</span
                  >
                </div>
                <div
                  id="latency-graph"
                  class="d-flex align-items-end gap-1 h-40 w-100 mb-3"
                  style="height: 200px"
                >
                  <!-- Bars injected by JS -->
                </div>
                <div
                  id="latency-details"
                  class="small font-monospace opacity-75"
                >
                  <!-- Role-specific details injected by dashboard.js -->
                </div>

                <!-- Technical Specs Grid -->
                <div
                  id="latency-specs"
                  class="row g-2 mt-3 pt-3 border-top border-white border-opacity-10"
                >
                  <!-- Technical specs injected by dashboard.js -->
                </div>
              </div>
            </div>

            <!-- Activity Logs -->
            <div class="col-lg-4">
              <div class="glass-panel p-4 h-100">
                <h6 class="label-caps mb-4">Threat_Intelligence_Log</h6>
                <div
                  class="font-monospace small d-flex flex-column gap-2"
                  id="log-terminal"
                  style="color: #00f0ff; height: 200px; overflow: hidden"
                >
                  <div>> INITIALIZING_DEEP_PACKET_SCAN...</div>
                </div>
              </div>
            </div>

            <!-- Role Specific Feature Section -->
            <div
              class="col-12 mt-4"
              id="role-specific-content"
              style="min-height: 300px"
            >
              <!-- Content based on role -->
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../../assets/js/script.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
  </body>
</html>
